{{- range $name, $svc := .Values.services }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "cortex.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.image.registry }}/{{ $svc.image }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          envFrom:
            - configMapRef:
                name: cortex-env
          env:
            - name: CORTEX_HTTP_PORT
              value: {{ $svc.port | quote }}
          # Slow-starting services (graph/ranking/llm wait for Neo4j) get a generous startup
          # window before liveness/readiness begin.
          startupProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            periodSeconds: 5
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /health
              port: {{ $svc.port }}
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ $svc.port }}
            periodSeconds: 10
          resources:
            {{- toYaml ($svc.resources | default $.Values.resources) | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app: {{ $name }}
    {{- include "cortex.labels" $ | nindent 4 }}
spec:
  selector:
    app: {{ $name }}
  ports:
    - name: http
      port: {{ $svc.port }}
      targetPort: {{ $svc.port }}
---
{{- end }}
{{- if .Values.dashboard.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: {{ .Values.namespace }}
  labels:
    app: dashboard
    {{- include "cortex.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.dashboard.replicas | default 1 }}
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.registry }}/{{ .Values.dashboard.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.dashboard.port }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.dashboard.port }}
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: {{ .Values.namespace }}
  labels:
    app: dashboard
    {{- include "cortex.labels" . | nindent 4 }}
spec:
  selector:
    app: dashboard
  ports:
    - name: http
      port: {{ .Values.dashboard.port }}
      targetPort: {{ .Values.dashboard.port }}
{{- end }}
