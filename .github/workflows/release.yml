name: release

# On a version tag: build and push every image to GHCR, then (opt-in) deploy to staging and
# production via Helm. Deploy jobs run only when the repo variable DEPLOY_ENABLED == "true"
# and the matching KUBE_CONFIG_* secret is set, so releases stay green before a cluster exists.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

jobs:
  images:
    name: Build + push ${{ matrix.service }}-service
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ingestion, entity, graph, retrieval, ranking, llm, notification, api]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}-service:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}-service:latest

  dashboard-image:
    name: Build + push dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/dashboard
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/dashboard:${{ env.VERSION }}
            ghcr.io/${{ github.repository_owner }}/dashboard:latest

  deploy-staging:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    needs: [images, dashboard-image]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > "$HOME/.kube/config"
      - name: Helm upgrade (staging)
        run: |
          helm upgrade --install cortex deploy/helm/cortex \
            -f deploy/helm/cortex/values-staging.yaml \
            --set image.tag="${VERSION}" \
            --namespace cortex-staging --create-namespace --wait --timeout 10m

  deploy-production:
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Write kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > "$HOME/.kube/config"
      - name: Helm upgrade (production)
        run: |
          helm upgrade --install cortex deploy/helm/cortex \
            -f deploy/helm/cortex/values-production.yaml \
            --set image.tag="${VERSION}" \
            --namespace cortex-prod --create-namespace --wait --timeout 15m
