{{- if .Values.infra.enabled }}
# Single-replica, non-persistent backends for demo/staging. For production set
# infra.enabled=false and point the env vars at managed Kafka / Neo4j / Qdrant / Redis.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: {{ .Values.namespace }}
  labels: {app: kafka}
spec:
  replicas: 1
  selector: {matchLabels: {app: kafka}}
  template:
    metadata: {labels: {app: kafka}}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.infra.kafka.image }}
          ports: [{containerPort: 9092}]
          env:
            - {name: KAFKA_NODE_ID, value: "1"}
            - {name: KAFKA_PROCESS_ROLES, value: "broker,controller"}
            - {name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093"}
            - {name: KAFKA_LISTENERS, value: "PLAINTEXT://:9092,CONTROLLER://:9093"}
            - {name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka:9092"}
            - {name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER"}
            - {name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"}
            - {name: KAFKA_INTER_BROKER_LISTENER_NAME, value: "PLAINTEXT"}
            - {name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1"}
            - {name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS, value: "0"}
---
apiVersion: v1
kind: Service
metadata: {name: kafka, namespace: {{ .Values.namespace }}, labels: {app: kafka}}
spec:
  selector: {app: kafka}
  ports: [{name: kafka, port: 9092, targetPort: 9092}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: {{ .Values.namespace }}
  labels: {app: neo4j}
spec:
  replicas: 1
  selector: {matchLabels: {app: neo4j}}
  template:
    metadata: {labels: {app: neo4j}}
    spec:
      containers:
        - name: neo4j
          image: {{ .Values.infra.neo4j.image }}
          ports: [{containerPort: 7687}, {containerPort: 7474}]
          env:
            - {name: NEO4J_AUTH, value: "neo4j/{{ .Values.infra.neo4j.password }}"}
---
apiVersion: v1
kind: Service
metadata: {name: neo4j, namespace: {{ .Values.namespace }}, labels: {app: neo4j}}
spec:
  selector: {app: neo4j}
  ports:
    - {name: bolt, port: 7687, targetPort: 7687}
    - {name: http, port: 7474, targetPort: 7474}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: {{ .Values.namespace }}
  labels: {app: qdrant}
spec:
  replicas: 1
  selector: {matchLabels: {app: qdrant}}
  template:
    metadata: {labels: {app: qdrant}}
    spec:
      containers:
        - name: qdrant
          image: {{ .Values.infra.qdrant.image }}
          ports: [{containerPort: 6333}]
---
apiVersion: v1
kind: Service
metadata: {name: qdrant, namespace: {{ .Values.namespace }}, labels: {app: qdrant}}
spec:
  selector: {app: qdrant}
  ports: [{name: http, port: 6333, targetPort: 6333}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: {{ .Values.namespace }}
  labels: {app: redis}
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata: {labels: {app: redis}}
    spec:
      containers:
        - name: redis
          image: {{ .Values.infra.redis.image }}
          ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata: {name: redis, namespace: {{ .Values.namespace }}, labels: {app: redis}}
spec:
  selector: {app: redis}
  ports: [{name: redis, port: 6379, targetPort: 6379}]
{{- end }}
